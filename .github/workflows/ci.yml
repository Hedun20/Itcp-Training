name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      CLIENT_URL: http://localhost:5173
      VITE_API_URL: /api/v1
      MONGODB_URI: mongodb://127.0.0.1:27017/itcp_training_test
      JWT_ACCESS_SECRET: ci-access-secret-with-at-least-thirty-two-characters
      JWT_REFRESH_SECRET: ci-refresh-secret-with-at-least-thirty-two-characters
      INSTRUCTOR_REGISTRATION_ENABLED: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Validate PM2 configuration
        run: node -e "const c=require('./deploy/pm2/ecosystem.config.cjs'); if(!Array.isArray(c.apps)||c.apps[0]?.name!=='itcp-training-api') process.exit(1)"

      - name: Validate PM2 deployment script
        run: bash -n deploy/scripts/deploy-pm2.sh

  production-containers:
    name: Production containers
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare example production environment
        run: |
          cp deploy/env.stack.example deploy/.env.stack
          cp deploy/env.mongo.example deploy/.env.mongo
          cp deploy/env.api.example deploy/.env.api
          cp deploy/env.seed.example deploy/.env.seed

      - name: Validate production Compose
        run: docker compose --env-file deploy/.env.stack -f deploy/docker-compose.production.yml config --quiet

      - name: Build production images
        run: docker compose --env-file deploy/.env.stack -f deploy/docker-compose.production.yml build api web
