name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      CLIENT_URL: http://localhost:5173
      VITE_API_URL: /api/v1
      MONGODB_URI: mongodb://127.0.0.1:27017/itcp_training_test
      JWT_ACCESS_SECRET: ci-access-secret-with-at-least-thirty-two-characters
      JWT_REFRESH_SECRET: ci-refresh-secret-with-at-least-thirty-two-characters
      INSTRUCTOR_REGISTRATION_ENABLED: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
