name: itcp-training

services:
  mongo:
    image: mongo:8.0
    restart: unless-stopped
    env_file: .env.mongo
    volumes:
      - mongo_data:/data/db
      - ./mongo/init-app-user.js:/docker-entrypoint-initdb.d/10-init-app-user.js:ro
    networks: [backend]
    healthcheck:
      test: [CMD, mongosh, --quiet, --eval, "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    image: itcp-training-api:local
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    env_file: .env.api
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - uploads_data:/app/server/uploads
    networks: [backend]
    healthcheck:
      test: [CMD, node, -e, "fetch('http://127.0.0.1:4000/api/v1/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    image: itcp-training-web:local
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        VITE_API_URL: /api/v1
        VITE_MEDIA_ORIGIN: ""
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - 127.0.0.1:${APP_HTTP_PORT:-8088}:80
    networks: [edge, backend]
    healthcheck:
      test: [CMD-SHELL, "wget -qO- http://127.0.0.1/healthz | grep ok"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  seed:
    image: itcp-training-api:local
    profiles: [tools]
    env_file: [.env.api, .env.seed]
    depends_on:
      mongo:
        condition: service_healthy
    command: [node, server/dist/seeds/index.js]
    networks: [backend]

  repair-content:
    image: itcp-training-api:local
    profiles: [tools]
    env_file: .env.api
    depends_on:
      mongo:
        condition: service_healthy
    command: [node, server/dist/seeds/repairContent.js]
    networks: [backend]

networks:
  edge:
  backend:
    internal: true

volumes:
  mongo_data:
  uploads_data:
